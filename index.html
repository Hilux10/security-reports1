<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דוח עיכוב — ניסוי PDF</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #F0F4F8; direction: rtl; }

  .header {
    background: linear-gradient(135deg, #1B2A4A, #0F4C81);
    color: #fff; padding: 18px 28px;
    display: flex; align-items: center; gap: 14px;
  }
  .header-title { font-size: 17px; font-weight: 700; }
  .header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  .form-wrap { max-width: 740px; margin: 28px auto; padding: 0 16px 60px; }
  .form-card {
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .form-card-header {
    background: #1B2A4A; color: #fff;
    padding: 16px 24px; font-size: 15px; font-weight: 700;
  }
  .form-body { padding: 24px; }

  .section-title {
    font-size: 11px; font-weight: 700; color: #64748B;
    text-transform: uppercase; letter-spacing: 0.8px;
    border-bottom: 1px solid #E2E8F0;
    padding-bottom: 8px; margin: 20px 0 14px;
  }
  .section-title:first-child { margin-top: 0; }

  .row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; flex: 1; min-width: 130px; }
  .field.full { flex: 1 1 100%; }
  .field.w2 { flex: 2; }

  label { font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
  .req { color: #EF4444; }

  input[type="text"], input[type="date"], input[type="time"], textarea {
    border: 1.5px solid #CBD5E1; border-radius: 8px;
    padding: 8px 11px; font-size: 13px; font-family: inherit;
    direction: rtl; background: #F8FAFC; width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus {
    outline: none; border-color: #0F4C81;
    box-shadow: 0 0 0 3px rgba(15,76,129,0.1); background: #fff;
  }
  input.invalid, textarea.invalid { border-color: #EF4444; }
  textarea { resize: vertical; min-height: 80px; }

  .cb-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .cb-item {
    display: flex; align-items: center; gap: 6px;
    background: #F1F5F9; border: 1.5px solid #CBD5E1;
    border-radius: 8px; padding: 7px 12px;
    cursor: pointer; font-size: 13px; color: #374151;
    user-select: none; transition: all 0.15s;
  }
  .cb-item input { display: none; }
  .cb-item.checked { background: #EFF6FF; border-color: #0F4C81; color: #0F4C81; font-weight: 600; }
  .cb-box {
    width: 15px; height: 15px; border: 2px solid #94A3B8;
    border-radius: 4px; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center; transition: all 0.15s;
  }
  .cb-item.checked .cb-box { background: #0F4C81; border-color: #0F4C81; }
  .cb-item.checked .cb-box::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 700; }

  .btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid #E2E8F0; }
  .btn {
    padding: 11px 28px; border-radius: 9px; font-size: 14px;
    font-weight: 700; cursor: pointer; font-family: inherit; border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg,#1B2A4A,#0F4C81); color: #fff; box-shadow: 0 3px 10px rgba(15,76,129,0.25); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(15,76,129,0.35); }
  .btn-pdf { background: #16A34A; color: #fff; box-shadow: 0 3px 10px rgba(22,163,74,0.25); }
  .btn-pdf:hover { transform: translateY(-1px); }
  .btn-pdf:disabled { background: #94A3B8; cursor: not-allowed; transform: none; }

  /* ══════════════════════════════════════════════
     PDF PREVIEW — נראה בדיוק כמו הדוח המקורי
  ══════════════════════════════════════════════ */
  #pdf-preview {
    display: none;
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 1000; overflow-y: auto; padding: 20px;
  }
  #pdf-preview.show { display: flex; align-items: flex-start; justify-content: center; }

  .pdf-doc {
    background: #fff; width: 210mm; max-width: 100%;
    padding: 16mm 18mm; font-family: 'Times New Roman', serif;
    direction: rtl; font-size: 11pt; line-height: 1.6;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    position: relative;
  }

  .pdf-org-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 6px;
    font-size: 10pt; color: #444;
  }
  .pdf-org-right { text-align: right; }
  .pdf-org-left { text-align: left; }
  .pdf-hr { border: none; border-top: 1.5px solid #000; margin: 8px 0 10px; }
  .pdf-title {
    text-align: center; font-size: 16pt; font-weight: bold;
    margin: 10px 0 16px; text-decoration: underline;
  }

  .pdf-row { margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; align-items: baseline; }
  .pdf-label { font-weight: bold; white-space: nowrap; }
  .pdf-val {
    border-bottom: 1px solid #000; min-width: 100px;
    flex: 1; padding: 0 4px; min-height: 18px;
    font-family: 'Times New Roman', serif;
  }

  .pdf-section { margin-top: 14px; margin-bottom: 4px; font-weight: bold; }
  .pdf-table {
    width: 100%; border-collapse: collapse; margin: 8px 0;
    font-size: 10pt;
  }
  .pdf-table th {
    border: 1px solid #000; padding: 5px 8px;
    background: #f0f0f0; font-weight: bold; text-align: center;
  }
  .pdf-table td {
    border: 1px solid #000; padding: 5px 8px; text-align: center;
  }

  .pdf-lines { margin: 6px 0; }
  .pdf-line {
    border-bottom: 1px solid #000; min-height: 22px;
    margin-bottom: 6px; padding: 2px 4px;
    font-family: 'Times New Roman', serif; font-size: 11pt;
  }

  .pdf-sig-row {
    margin-top: 24px; display: flex;
    justify-content: space-between; align-items: flex-end;
  }
  .pdf-sig { text-align: center; }
  .pdf-sig-line { border-top: 1px solid #000; width: 140px; margin: 4px auto 0; }

  .pdf-footer {
    margin-top: 20px; font-size: 9pt; color: #444;
    border-top: 1px solid #ccc; padding-top: 8px; text-align: center;
  }

  .pdf-actions-wrap { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 16px; }
  .pdf-close-btn {
    background: #EF4444; color: #fff; border: none;
    padding: 9px 20px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 700; font-family: inherit;
  }
  .pdf-print-btn {
    background: #16A34A; color: #fff; border: none;
    padding: 9px 20px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 700; font-family: inherit;
  }

  @media print {
    body > *:not(#pdf-preview) { display: none !important; }
    #pdf-preview { display: block !important; position: static !important; background: none !important; padding: 0 !important; }
    .pdf-actions-wrap { display: none !important; }
    .pdf-doc { box-shadow: none !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div style="font-size:28px;">🚆</div>
  <div>
    <div class="header-title">דוח עיכוב לאיש ביטחון — ניסוי PDF</div>
    <div class="header-sub">מחלקת אבטחה פיזית | אגף ביטחון — רכבת ישראל</div>
  </div>
</div>

<div class="form-wrap">
  <div class="form-card">
    <div class="form-card-header">🛑 מילוי דוח עיכוב</div>
    <div class="form-body">

      <div class="section-title">פרטי ממלא הדוח</div>
      <div class="row">
        <div class="field"><label><span class="req">*</span> שם פרטי</label><input type="text" id="d-fname" placeholder="שם פרטי"></div>
        <div class="field"><label><span class="req">*</span> שם משפחה</label><input type="text" id="d-lname" placeholder="שם משפחה"></div>
        <div class="field"><label><span class="req">*</span> ת.ז.</label><input type="text" id="d-id" placeholder="מספר ת.ז."></div>
        <div class="field"><label><span class="req">*</span> תפקיד</label><input type="text" id="d-role" placeholder="תפקיד"></div>
        <div class="field"><label><span class="req">*</span> מס' תעודת מאבטח</label><input type="text" id="d-badge" placeholder="מס' תעודה"></div>
      </div>

      <div class="section-title">פרטי האירוע</div>
      <div class="row">
        <div class="field"><label><span class="req">*</span> תאריך</label><input type="date" id="d-date"></div>
        <div class="field"><label><span class="req">*</span> שעה</label><input type="time" id="d-time"></div>
        <div class="field w2"><label><span class="req">*</span> תחנה / ק"מ</label><input type="text" id="d-station" placeholder="תחנה או ק&quot;מ"></div>
      </div>

      <div class="section-title">פרטי המעוכב</div>
      <div class="row">
        <div class="field w2"><label><span class="req">*</span> שם פרטי + משפחה</label><input type="text" id="d-sus-name" placeholder="שם מלא"></div>
        <div class="field"><label><span class="req">*</span> ת.ז.</label><input type="text" id="d-sus-id" placeholder="ת.ז."></div>
        <div class="field"><label><span class="req">*</span> תאריך לידה</label><input type="date" id="d-sus-dob"></div>
      </div>
      <div class="row">
        <div class="field full"><label><span class="req">*</span> כתובת</label><input type="text" id="d-sus-addr" placeholder="כתובת מגורים מלאה"></div>
      </div>

      <div class="section-title">סיבת העיכוב</div>
      <div class="field full" style="margin-bottom:14px;">
        <label><span class="req">*</span> עוכב בחשד שעבר עבירה מסוג</label>
        <input type="text" id="d-crime" placeholder="פרט סוג העבירה">
      </div>
      <div class="field full" style="margin-bottom:14px;">
        <label><span class="req">*</span> עיכבתי את החשוד כי</label>
        <textarea id="d-reason" rows="3" placeholder="פרט את הסיבה..."></textarea>
      </div>

      <div class="section-title">פעולות שננקטו</div>
      <div class="cb-group">
        <label class="cb-item" onclick="toggleCb(this)"><input type="checkbox" id="cb1"><span class="cb-box"></span>הזדהיתי בפני המעוכב בתעודת מאבטח / מנב"ט</label>
        <label class="cb-item" onclick="toggleCb(this)"><input type="checkbox" id="cb2"><span class="cb-box"></span>הודעתי למעוכב שהוא מעוכב</label>
        <label class="cb-item" onclick="toggleCb(this)"><input type="checkbox" id="cb3"><span class="cb-box"></span>הודעתי על סיבת העיכוב</label>
        <label class="cb-item" onclick="toggleCb(this)"><input type="checkbox" id="cb4"><span class="cb-box"></span>הודעתי שעליו להמתין עד לבוא המשטרה</label>
      </div>
      <div class="field full" style="margin-bottom:14px;">
        <label><span class="req">*</span> פעולות נוספות שבוצעו</label>
        <textarea id="d-extra" rows="2" placeholder="פרט פעולות נוספות..."></textarea>
      </div>

      <div class="section-title">תגובת המעוכב</div>
      <div class="field full" style="margin-bottom:14px;">
        <label><span class="req">*</span> תגובת המעוכב</label>
        <textarea id="d-reaction" rows="3" placeholder="כיצד הגיב המעוכב..."></textarea>
      </div>

      <div class="section-title">אנשי ביטחון שנכחו בעיכוב</div>
      <div class="row">
        <div class="field"><input type="text" id="d-w1" placeholder="שם 1"></div>
        <div class="field"><input type="text" id="d-w2" placeholder="שם 2"></div>
        <div class="field"><input type="text" id="d-w3" placeholder="שם 3"></div>
      </div>

      <div class="section-title">פריטים שנתפסו</div>
      <div class="field full" style="margin-bottom:14px;">
        <label>פרטי הפריטים (כולל סיבת התפיסה)</label>
        <textarea id="d-seized" rows="2" placeholder="פרט פריטים שנתפסו, או 'לא נתפסו פריטים'"></textarea>
      </div>

      <div class="section-title">מסירת המעוכב למשטרה</div>
      <div class="row">
        <div class="field"><label><span class="req">*</span> שם השוטר</label><input type="text" id="d-cop-name" placeholder="שם מלא"></div>
        <div class="field"><label><span class="req">*</span> דרגה</label><input type="text" id="d-cop-rank" placeholder="דרגה"></div>
        <div class="field"><label><span class="req">*</span> מס' אישי</label><input type="text" id="d-cop-num" placeholder="מס' אישי"></div>
        <div class="field"><label><span class="req">*</span> יחידה</label><input type="text" id="d-cop-unit" placeholder="יחידה"></div>
        <div class="field"><label><span class="req">*</span> בשעה</label><input type="time" id="d-handover"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-pdf" id="pdf-btn" onclick="generatePDF()" disabled>📄 הצג כדוח PDF</button>
        <button class="btn btn-primary" onclick="validateForm()">שלח דוח ✓</button>
      </div>
    </div>
  </div>
</div>

<!-- PDF Preview Modal -->
<div id="pdf-preview">
  <div style="width:100%; max-width:240mm;">
    <div class="pdf-actions-wrap">
      <button class="pdf-close-btn" onclick="closePDF()">✕ סגור</button>
      <button class="pdf-print-btn" onclick="window.print()">🖨️ הדפס / שמור PDF</button>
    </div>
    <div class="pdf-doc" id="pdf-doc">
      <!-- יווצר דינמית -->
    </div>
  </div>
</div>

<script>
  function toggleCb(label) {
    label.classList.toggle('checked');
    checkEnablePDF();
  }

  // Enable PDF button when required fields have content
  document.querySelectorAll('input, textarea').forEach(el => {
    el.addEventListener('input', checkEnablePDF);
  });

  function checkEnablePDF() {
    const required = ['d-fname','d-lname','d-id','d-role','d-badge',
      'd-date','d-time','d-station','d-sus-name','d-sus-id','d-sus-dob',
      'd-sus-addr','d-crime','d-reason','d-reaction','d-cop-name',
      'd-cop-rank','d-cop-num','d-cop-unit','d-handover'];
    const allFilled = required.every(id => document.getElementById(id).value.trim() !== '');
    document.getElementById('pdf-btn').disabled = !allFilled;
  }

  function fmtDate(val) {
    if (!val) return '___________';
    const [y,m,d] = val.split('-');
    return `${d}/${m}/${y}`;
  }
  function fmtTime(val) { return val || '_______'; }
  function fmtVal(val) { return val || '___________'; }

  function generatePDF() {
    const checks = [
      document.getElementById('cb1').closest('.cb-item').classList.contains('checked'),
      document.getElementById('cb2').closest('.cb-item').classList.contains('checked'),
      document.getElementById('cb3').closest('.cb-item').classList.contains('checked'),
      document.getElementById('cb4').closest('.cb-item').classList.contains('checked'),
    ];
    const checkMark = c => c ? '✓' : '☐';
    const witnesses = [
      document.getElementById('d-w1').value,
      document.getElementById('d-w2').value,
      document.getElementById('d-w3').value,
    ].filter(w => w.trim()).join('  |  ') || '___________________________';

    document.getElementById('pdf-doc').innerHTML = `
      <div class="pdf-org-header">
        <div class="pdf-org-right">מחלקת אבטחה פיזית</div>
        <div class="pdf-org-left">אגף בטחון</div>
      </div>
      <div style="text-align:center; font-size:9pt; color:#555; margin-bottom:4px;">עודכן בתאריך 21/3/2018</div>
      <hr class="pdf-hr">
      <div class="pdf-title">דו"ח עיכוב לאיש ביטחון</div>

      <div style="font-weight:bold; margin-bottom:8px;">פרטי ממלא הדו"ח:</div>
      <table class="pdf-table">
        <thead><tr>
          <th>ת.ז.</th><th>תפקיד</th><th>שם פרטי</th><th>שם משפחה</th><th>מס' תעודת מאבטח</th>
        </tr></thead>
        <tbody><tr>
          <td>${fmtVal(document.getElementById('d-id').value)}</td>
          <td>${fmtVal(document.getElementById('d-role').value)}</td>
          <td>${fmtVal(document.getElementById('d-fname').value)}</td>
          <td>${fmtVal(document.getElementById('d-lname').value)}</td>
          <td>${fmtVal(document.getElementById('d-badge').value)}</td>
        </tr></tbody>
      </table>

      <div class="pdf-row" style="margin-top:12px;">
        <span class="pdf-label">תאריך:</span>
        <span class="pdf-val">${fmtDate(document.getElementById('d-date').value)}</span>
        <span class="pdf-label">שעה:</span>
        <span class="pdf-val" style="min-width:60px;">${fmtTime(document.getElementById('d-time').value)}</span>
        <span class="pdf-label">תחנה / ק"מ:</span>
        <span class="pdf-val">${fmtVal(document.getElementById('d-station').value)}</span>
      </div>

      <div class="pdf-row">
        <span class="pdf-label">פרטי המעוכב:</span>
        <span class="pdf-val">${fmtVal(document.getElementById('d-sus-id').value)}</span>
        <span class="pdf-val">${fmtVal(document.getElementById('d-sus-name').value)}</span>
        <span class="pdf-val" style="min-width:80px;">${fmtDate(document.getElementById('d-sus-dob').value)}</span>
        <span class="pdf-val">${fmtVal(document.getElementById('d-sus-addr').value)}</span>
      </div>
      <div style="font-size:9pt; color:#555; margin-top:-6px; margin-bottom:10px;">
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        (ת.ז.)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        (שם+משפחה)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        (תאריך לידה)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        (כתובת)
      </div>

      <div class="pdf-row">
        <span class="pdf-label">עוכב בחשד שעבר עבירה מסוג:</span>
        <span class="pdf-val">${fmtVal(document.getElementById('d-crime').value)}</span>
      </div>

      <div style="font-weight:bold; margin: 10px 0 4px;">עיכבתי את החשוד כי:</div>
      <div class="pdf-lines">
        <div class="pdf-line">${document.getElementById('d-reason').value}</div>
      </div>

      <div style="font-weight:bold; margin: 12px 0 8px;">פעולות שננקטו:</div>
      <div style="margin-right: 16px; line-height: 2.2; font-size: 11pt;">
        <div>${checkMark(checks[0])} הזדהיתי בפני המעוכב בציון פרטיי ע"י תעודת מאבטח / מנב"ט.</div>
        <div>${checkMark(checks[1])} הודעתי למעוכב שהוא מעוכב.</div>
        <div>${checkMark(checks[2])} הודעתי למעוכב על סיבת העיכוב.</div>
        <div>${checkMark(checks[3])} הודעתי למעוכב שעליו לחכות עימי עד לבוא אנשי משטרה.</div>
        <div>ביצעתי את הפעולות הבאות:</div>
        <div class="pdf-line">${document.getElementById('d-extra').value}</div>
      </div>

      <div style="font-weight:bold; margin: 12px 0 4px;">תגובת המעוכב:</div>
      <div class="pdf-lines">
        <div class="pdf-line">${document.getElementById('d-reaction').value}</div>
        <div class="pdf-line"></div>
      </div>

      <div class="pdf-row" style="margin-top:10px;">
        <span class="pdf-label">שמות אנשי הביטחון / מנב"ט שנכחו בעיכוב:</span>
        <span class="pdf-val">${witnesses}</span>
      </div>

      <div class="pdf-row">
        <span class="pdf-label">מהמעוכב תפסתי את הפריטים הבאים (כולל סיבת התפיסה):</span>
      </div>
      <div class="pdf-lines">
        <div class="pdf-line">${fmtVal(document.getElementById('d-seized').value)}</div>
        <div class="pdf-line"></div>
      </div>

      <div class="pdf-row" style="margin-top:10px;">
        <span class="pdf-label">את המעוכב, מסרתי לידי השוטר:</span>
        <span class="pdf-val">${fmtVal(document.getElementById('d-cop-name').value)}</span>
        <span class="pdf-val" style="min-width:70px;">${fmtVal(document.getElementById('d-cop-rank').value)}</span>
        <span class="pdf-val" style="min-width:70px;">${fmtVal(document.getElementById('d-cop-num').value)}</span>
        <span class="pdf-val">${fmtVal(document.getElementById('d-cop-unit').value)}</span>
      </div>
      <div style="font-size:9pt; color:#555; margin-top:-6px; margin-bottom:10px;">
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        (שם)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        (דרגה)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        (מס' אישי)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        (יחידה)
      </div>

      <div class="pdf-row">
        <span class="pdf-label">בשעה:</span>
        <span class="pdf-val" style="min-width:80px;">${fmtTime(document.getElementById('d-handover').value)}</span>
      </div>

      <div class="pdf-sig-row">
        <div></div>
        <div class="pdf-sig">
          <div>חתימת ממלא הדו"ח:</div>
          <div class="pdf-sig-line"></div>
        </div>
      </div>

      <div class="pdf-footer">
        יש לצרף דו"ח זה לדו"ח אירוע בטחוני ולשלוח למשרד הקב"ט הרלוונטי:<br>
        <strong>צפון — 04-8564428, פקס רכבתי: 4428 &nbsp;|&nbsp; דרום — 1538-9778774</strong>
      </div>
    `;

    document.getElementById('pdf-preview').classList.add('show');
    document.getElementById('pdf-preview').scrollTop = 0;
  }

  function closePDF() {
    document.getElementById('pdf-preview').classList.remove('show');
  }

  function validateForm() {
    const required = ['d-fname','d-lname','d-id','d-role','d-badge',
      'd-date','d-time','d-station','d-sus-name','d-sus-id','d-sus-dob',
      'd-sus-addr','d-crime','d-reason','d-reaction','d-cop-name',
      'd-cop-rank','d-cop-num','d-cop-unit','d-handover'];
    let valid = true;
    required.forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add('invalid'); valid = false; }
      else el.classList.remove('invalid');
    });
    if (!valid) {
      document.querySelector('.invalid').scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    generatePDF();
  }

  // Set today
  document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
